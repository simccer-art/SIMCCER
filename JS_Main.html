<script>
  // ================= VARIABILI GLOBALI =================
  let utenteCorrente = null; 
  let utentiDelegabili = []; let utentiVisita = []; let storicoRimborsiCache = []; 
  let praticheInMemoria = []; let praticheRaggruppate = {}; let datiStatisticheRaw = null; 
  let bozzaPeriodi = []; let modalitaAttuale = 'DASHBOARD'; 
  let hashMemoriaPermessi = ""; let hashMemoriaVisite = ""; let hashMemoriaRimborsi = ""; 
  let datiContabilitaCache = null; let segreteriaContabilita = ""; let isContabEditMode = false;
  let partecipantiVisitaCorrente = []; let bozzaVisite = []; let utentiGestioneCache = [];
  
  const GERARCHIA = { "UTENTE": 1, "SEGRGEN": 2, "APPROVATORE": 3, "GESTORE": 4, "AMMINISTRATORE": 5 };

  // ================= UTILITY =================
  function formattaDataIT(dataStr) { if(!dataStr) return ""; const d = String(dataStr); if(d.includes('/')) return d; const p = d.split('T')[0].split('-'); return (p.length === 3) ? `${p[2]}/${p[1]}/${p[0]}` : d; }
  function parseDateIT(dateStr) { if(!dateStr) return 0; let parts = dateStr.split('/'); if(parts.length === 3) return new Date(parts[2], parts[1] - 1, parts[0]).getTime(); return 0; }
  function formattaVisualizzazionePeriodo(inizio, fine) { const start = formattaDataIT(inizio); const end = formattaDataIT(fine); return (start === end) ? `Il ${start}` : `Dal ${start} al ${end}`; }
  function calcolaGiorni(d1, d2) { const start = new Date(d1); const end = new Date(d2); return Math.ceil(Math.abs(end - start) / (1000 * 60 * 60 * 24)) + 1; }
  function getColoreStato(stato) { switch(stato) { case "IN ATTESA": return "var(--warning)"; case "VISTATO": return "var(--vista)"; case "APPROVATO": return "var(--success)"; case "EVASA": case "EVASO": return "var(--evadi)"; case "PAGATO": return "var(--pagato)"; case "IN ATTESA ALLEGATO": return "#e0a800"; case "DA CORREGGERE": return "#e0a800"; case "FRUITO": return "var(--fruito)"; case "RIFIUTATO": case "RIFIUTATA": return "var(--danger)"; default: return "black"; } }
  
  function showToast(msg) { let container = document.getElementById('toast-container'); let toast = document.createElement('div'); toast.className = 'toast'; toast.innerHTML = msg; container.appendChild(toast); setTimeout(() => { toast.style.opacity = "1"; }, 100); setTimeout(() => { toast.style.opacity = "0"; setTimeout(()=>toast.remove(), 500); }, 5000); }
  function evidenziaBottone(btnId) { document.querySelectorAll('#menu-buttons .btn').forEach(b => { b.style.backgroundColor = "transparent"; b.style.color = "var(--primary)"; b.style.border = "2px solid var(--primary)"; }); let btn = document.getElementById(btnId); if(btn) { btn.style.backgroundColor = "var(--primary)"; btn.style.color = "white"; } }

  // ================= LOGIN E DASHBOARD =================
  function aggiornaHeaderInfo() {
      if(utenteCorrente) {
          document.getElementById('user-header-name').innerText = utenteCorrente.cognome + " " + utenteCorrente.nome;
          let iniziali = (utenteCorrente.cognome.charAt(0) + utenteCorrente.nome.charAt(0)).toUpperCase();
          document.getElementById('global-header-avatar').innerText = iniziali;
          ricaricaFotoProfiloUI();
      }
  }

  function eseguiLogin() {
    const pwd = document.getElementById('password').value; 
    if (!pwd) return alert("Inserisci la password.");
    const errBox = document.getElementById('login-error'); 
    errBox.style.display = 'block'; errBox.style.color = 'black'; errBox.innerText = "Accesso in corso...";
    
    google.script.run.withSuccessHandler(res => {
          if (res && res.error) { errBox.style.color = 'red'; errBox.innerText = res.error; } 
          else { 
              utenteCorrente = res; 
              document.getElementById('login-section').style.display = 'none'; 
              document.getElementById('main-ui').style.display = 'block';
              inizializzaDashboard(); 
              if(typeof caricaUtentiDelega === "function") caricaUtentiDelega(); 
              if(typeof caricaUtentiVisita === "function") caricaUtentiVisita(); 
          }
      }).effettuaLogin(pwd);
  }

  function inizializzaDashboard() {
    modalitaAttuale = 'DASHBOARD'; document.getElementById('page-current-modulo').innerText = "DASHBOARD";
    aggiornaHeaderInfo();
    
    let moduli = ['container-profilo-globale', 'container-permessi', 'container-visite', 'container-gestione', 'container-rimborsi', 'container-contabilita', 'container-materiali', 'container-rubrica'];
    moduli.forEach(id => { let el = document.getElementById(id); if(el) el.style.display = 'none'; });
    document.getElementById('menu-buttons').style.display = 'none';
    
    let liv = GERARCHIA[utenteCorrente.ruoloBase] || 1; let ruoloStr = String(utenteCorrente.ruolo || "").toUpperCase();
    
    let vociMenuSide = `<a class="menu-item active" id="side-DASHBOARD" onclick="eseguiApriModulo('DASHBOARD')"><span class="menu-icon">📊</span>Dashboard</a>`;
    if (liv >= 2) vociMenuSide += `<a class="menu-item" id="side-GESTIONE" onclick="eseguiApriModulo('GESTIONE')"><span class="menu-icon">👥</span>Gestione Segretari</a>`;
    
    let vociModuliServer = utenteCorrente.menu || ["PERMESSI SINDACALI"];
    vociModuliServer.forEach(voce => {
        if (voce.includes('PERMESSI')) vociMenuSide += `<a class="menu-item" id="side-PERMESSI" onclick="eseguiApriModulo('PERMESSI')"><span class="menu-icon">📄</span>Permessi<span id="badge-dash-permessi" class="badge" style="display:none;"></span></a>`;
        else if (voce.includes('VISITE')) vociMenuSide += `<a class="menu-item" id="side-VISITE" onclick="eseguiApriModulo('VISITE')"><span class="menu-icon">🏥</span>Visite<span id="badge-dash-visite" class="badge" style="display:none;"></span></a>`;
        else if (voce.includes('RIMBORS')) vociMenuSide += `<a class="menu-item" id="side-RIMBORSI" onclick="eseguiApriModulo('RIMBORSI')"><span class="menu-icon">💸</span>Rimborsi<span id="badge-dash-rimborsi" class="badge" style="display:none;"></span></a>`;
    });

    if (ruoloStr.includes('MAT') || ruoloStr.includes('MAT2') || ruoloStr.includes('AMMINISTRATORE')) vociMenuSide += `<a class="menu-item" id="side-MATERIALI" onclick="eseguiApriModulo('MATERIALI')"><span class="menu-icon">📦</span>Materiali</a>`;
    if (ruoloStr.includes('TESORIERE') || ruoloStr.includes('TESORIERE2')) vociMenuSide += `<a class="menu-item" id="side-CONTABILITA" onclick="eseguiApriModulo('CONTABILITA')"><span class="menu-icon">💶</span>Contabilità</a>`;
    vociMenuSide += `<a class="menu-item" id="side-RUBRICA" onclick="eseguiApriModulo('RUBRICA')"><span class="menu-icon">📇</span>Rubrica<span id="badge-dash-rubrica" class="badge" style="display:none;"></span></a>`;
    
    document.getElementById('main-sidebar-menu').innerHTML = vociMenuSide;
    
    document.getElementById('dashboard-section').style.display = 'block';
    
    let row1Html = "";
    vociModuliServer.forEach(voce => {
        if (voce.includes('PERMESSI')) row1Html += `<div class="dash-card" onclick="eseguiApriModulo('PERMESSI')"><h3>PERMESSI SINDACALI</h3><p>Controlla le tue richieste e giorni fruiti.</p></div>`;
        else if (voce.includes('VISITE')) row1Html += `<div class="dash-card" onclick="eseguiApriModulo('VISITE')"><h3>VISITE AI REPARTI</h3><p>Organizza le visite sul territorio.</p></div>`;
        else if (voce.includes('RIMBORS')) row1Html += `<div class="dash-card" onclick="eseguiApriModulo('RIMBORSI')"><h3>RIMBORSI SPESE</h3><p>Inserisci spese e verifica i pagamenti.</p></div>`;
    });
    document.getElementById('dashboard-cards').innerHTML = row1Html;
    
    if (!window.pollingDashInterval && typeof caricaNotificheDashboard === "function") {
      window.pollingDashInterval = setInterval(() => caricaNotificheDashboard(false), 30000); 
    }
    if(typeof caricaNotificheDashboard === "function") caricaNotificheDashboard(true);
  }

  function eseguiApriModulo(nomeModulo) {
    modalitaAttuale = nomeModulo; 
    document.querySelectorAll('.menu-item').forEach(el => el.classList.remove('active'));
    let sideItem = document.getElementById('side-' + nomeModulo); if(sideItem) sideItem.classList.add('active');
    
    document.getElementById('page-current-modulo').innerText = nomeModulo.replace('-', ' ').toUpperCase();
    document.getElementById('dashboard-section').style.display = 'none'; 
    ['container-profilo-globale', 'container-permessi', 'container-visite', 'container-gestione', 'container-rimborsi', 'container-contabilita', 'container-materiali', 'container-rubrica'].forEach(id => { let el = document.getElementById(id); if(el) el.style.display = 'none'; });

    let liv = GERARCHIA[utenteCorrente.ruoloBase] || 1; 
    let btnContainer = document.getElementById('menu-buttons');
    let menuHtml = ''; btnContainer.style.display = 'none'; // nascosto di base, si accende solo se ci sono bottoni

    if (nomeModulo === 'DASHBOARD') {
        document.getElementById('dashboard-section').style.display = 'block';
    } else if (nomeModulo === 'UTENTE') {
        document.getElementById('container-profilo-globale').style.display = 'block'; 
        document.getElementById('content-profilo-globale').innerHTML = buildProfiloHTML(true);
        if (liv === 5) { document.getElementById('admin-modifiche-profilo').style.display = 'block'; if(typeof caricaModificheProfilo === "function") caricaModificheProfilo(); } 
    } else if (nomeModulo === 'GESTIONE') {
        document.getElementById('container-gestione').style.display = 'block'; 
        if(typeof caricaGestioneSegretari === "function") caricaGestioneSegretari();
    } else if (nomeModulo === 'PERMESSI') {
        document.getElementById('container-permessi').style.display = 'block'; 
        document.getElementById('content-profilo-permessi').innerHTML = buildProfiloHTML(false);
        menuHtml += `<button class="btn btn-small" id="nav-p-prof" onclick="evidenziaBottone('nav-p-prof'); mostraSezionePermessi('profilo-permessi')">PROFILO</button><button class="btn btn-small" id="nav-p-mie" onclick="evidenziaBottone('nav-p-mie'); mostraSezionePermessi('mie-richieste'); caricaMieRichieste();">MIE RICHIESTE <span id="badge-mie" class="badge" style="display:none;"></span></button><button class="btn btn-small" id="nav-p-nuovo" onclick="evidenziaBottone('nav-p-nuovo'); mostraSezionePermessi('permessi')">CHIEDI PERMESSO</button>`;
        if (liv >= 2) menuHtml += `<button class="btn btn-small" id="nav-p-gest" onclick="evidenziaBottone('nav-p-gest'); mostraSezionePermessi('gestione'); caricaPratiche();">GESTIONE PRATICHE <span id="badge-gestione" class="badge" style="display:none;"></span></button>`;
        menuHtml += `<button class="btn btn-small" id="nav-p-stat" onclick="evidenziaBottone('nav-p-stat'); mostraSezionePermessi('statistiche'); caricaDatiStatistiche();">STATISTICHE</button>`;
        btnContainer.style.display = 'flex';
    } else if (nomeModulo === 'VISITE') {
        document.getElementById('container-visite').style.display = 'block'; 
        document.getElementById('content-profilo-visite').innerHTML = buildProfiloHTML(false); 
        if(typeof popolaOrariVisita === "function") popolaOrariVisita();
        menuHtml += `<button class="btn btn-small" id="nav-v-prof" onclick="evidenziaBottone('nav-v-prof'); mostraSezioneVisite('profilo-visite')">PROFILO</button><button class="btn btn-small" id="nav-v-mie" onclick="evidenziaBottone('nav-v-mie'); onclickMieVisite()">MIE VISITE <span id="badge-mie-visite" class="badge" style="display:none;"></span></button><button class="btn btn-small" id="nav-v-nuovo" onclick="evidenziaBottone('nav-v-nuovo'); mostraSezioneVisite('componi-visita'); caricaMenuPartecipantiVisita();">INSERISCI VISITA</button>`;
        if (liv >= 2) menuHtml += `<button class="btn btn-small" id="nav-v-gest" onclick="evidenziaBottone('nav-v-gest'); onclickGestioneVisite()">GESTIONE VISITE <span id="badge-gestione-visite" class="badge" style="display:none;"></span></button>`;
        btnContainer.style.display = 'flex';
    } else if (nomeModulo === 'RIMBORSI') {
        document.getElementById('container-rimborsi').style.display = 'block'; 
        document.getElementById('content-profilo-rimborsi').innerHTML = buildProfiloHTML(false); 
        if(typeof popolaTendineRimborsi === "function") popolaTendineRimborsi();
        menuHtml += `<button class="btn btn-small" id="nav-r-prof" onclick="evidenziaBottone('nav-r-prof'); mostraSezioneRimborsi('profilo-rimborsi')">PROFILO</button><button class="btn btn-small" id="nav-r-mie" onclick="evidenziaBottone('nav-r-mie'); mostraSezioneRimborsi('mie-richieste-rimborsi'); caricaMieRichiesteRimborsi();">MIE RICHIESTE <span id="badge-mie-rimborsi" class="badge" style="display:none;"></span></button><button class="btn btn-small" id="nav-r-nuovo" onclick="evidenziaBottone('nav-r-nuovo'); mostraSezioneRimborsi('componi-rimborso');">NUOVO RIMBORSO</button>`;
        if (liv >= 2 || utenteCorrente.ruolo.includes('TESORIERE')) { menuHtml += `<button class="btn btn-small" id="nav-r-gest" onclick="evidenziaBottone('nav-r-gest'); mostraSezioneRimborsi('gestione-rimborsi'); caricaGestioneRimborsi();">GESTIONE RIMBORSI <span id="badge-gestione-rimborsi" class="badge" style="display:none;"></span></button>`; }
        btnContainer.style.display = 'flex';
    } else if (nomeModulo === 'CONTABILITA') {
        document.getElementById('container-contabilita').style.display = 'block'; 
        if(typeof caricaDatiContabilita === "function") caricaDatiContabilita();
    } else if (nomeModulo === 'MATERIALI') {
        document.getElementById('container-materiali').style.display = 'block';
        if(typeof caricaDatiMateriali === "function") caricaDatiMateriali();
    } else if (nomeModulo === 'RUBRICA') {
        document.getElementById('container-rubrica').style.display = 'block';
        if(typeof caricaRubrica === "function") caricaRubrica();
    }
    
    btnContainer.innerHTML = menuHtml; 
    ricaricaFotoProfiloUI(); 
    if(typeof caricaNotificheDashboard === "function") caricaNotificheDashboard(true);

    if (nomeModulo === 'PERMESSI') { mostraSezionePermessi('mie-richieste'); caricaMieRichieste(); evidenziaBottone('nav-p-mie'); } 
    else if (nomeModulo === 'VISITE') { onclickMieVisite(); evidenziaBottone('nav-v-mie'); } 
    else if (nomeModulo === 'RIMBORSI') { mostraSezioneRimborsi('mie-richieste-rimborsi'); caricaMieRichiesteRimborsi(); evidenziaBottone('nav-r-mie'); } 
  }

  function mostraSezionePermessi(id) { document.querySelectorAll('#container-permessi .card').forEach(c => c.style.display = 'none'); let el = document.getElementById('sezione-' + id); if(el) el.style.display = 'block'; }
  function mostraSezioneVisite(id) { document.querySelectorAll('#container-visite .card').forEach(c => c.style.display = 'none'); let el = document.getElementById('sezione-' + id); if(el) el.style.display = 'block'; }
  function mostraSezioneRimborsi(id) { document.querySelectorAll('#container-rimborsi .card').forEach(c => c.style.display = 'none'); let el = document.getElementById('sezione-' + id); if(el) el.style.display = 'block'; if(id==='componi-rimborso' && typeof inizializzaFormRimborsi==='function') inizializzaFormRimborsi(); }

  // ================= PROFILO HTML =================
  function buildProfiloHTML(withEdit) {
    let html = `<div id="${withEdit ? 'view-profilo-globale' : 'view-profilo-locale'}">
          <div style="width: 120px; height: 120px; border-radius: 50%; background-color: var(--primary); margin: 0 auto 25px auto; overflow: hidden; border: 3px solid #eee; display: flex; align-items: center; justify-content: center; cursor: pointer;" ${withEdit ? `onclick="document.getElementById('global-file-foto').click()"` : ''}>
              <span class="profilo-img-placeholder" style="color: white; font-size: 14px; font-weight:bold; ${!withEdit ? `display:none;` : ''}">Carica Foto</span>
              <img class="profilo-img" style="width: 100%; height: 100%; object-fit: cover; display: none;">
          </div>
          <div style="text-align: left; line-height: 2; font-size: 14px; background: #f8f9fa; padding: 20px; border: 1px solid #ddd; border-left: 5px solid var(--primary); border-radius:6px;">
            <div><strong>COGNOME NOME:</strong> ${utenteCorrente.cognome} ${utenteCorrente.nome}</div><div><strong>GRADO:</strong> ${utenteCorrente.grado}</div>
            <div><strong>CARICA E PROVINCIA:</strong> ${utenteCorrente.carica} ${utenteCorrente.provincia}</div><div><strong>DATA ELEZIONE:</strong> ${utenteCorrente.dataElezione}</div>
            <div><strong>CONSIGLIERE:</strong> ${utenteCorrente.consigliere} &nbsp;&nbsp;&nbsp;<strong>DATA NOMINA:</strong> ${utenteCorrente.dataNomina}</div>
            <div><strong>SEGRETERIA:</strong> ${utenteCorrente.segreteria}</div><div><strong>CIP:</strong> ${utenteCorrente.cip}</div><div><strong>REPARTO:</strong> ${utenteCorrente.reparto}</div>
            <div><strong>PROVINCIA SERVIZIO:</strong> ${utenteCorrente.provServizio}</div><div><strong>ORGANIZZAZIONE:</strong> ${utenteCorrente.organizzazione}</div>
            <div><strong>EMAIL:</strong> ${utenteCorrente.email} &nbsp;&nbsp;&nbsp;<strong>TELEFONO:</strong> ${utenteCorrente.telefono}</div><div><strong>RUOLO:</strong> ${utenteCorrente.ruolo}</div>
            <div style="margin-top: 15px; padding-top: 15px; border-top: 1px dashed #ccc;">
               <div style="color:var(--danger-red); font-weight:bold; margin-bottom:10px;">DATI FINANZIARI / RIMBORSI</div>
               <div><strong>CODICE FISCALE:</strong> ${utenteCorrente.cf || '-'}</div>
               <div><strong>IBAN REGISTRATI:</strong> ${(utenteCorrente.ibans||[]).map(i=>i.alias+': '+i.iban).join(', ') || '-'}</div>
               <div><strong>VETTURE REGISTRATE:</strong> ${(utenteCorrente.vetture||[]).map(v=>v.modello+' ('+v.targa+')').join(', ') || '-'}</div>
             </div></div>`;

    if(withEdit) {
        html += `<button id="btn-apri-modifica" class="btn" style="margin-top:20px; background:transparent; color:var(--text-soft); border:2px solid var(--text-soft);" onclick="if(typeof mostraEditProfilo === 'function') mostraEditProfilo()">RICHIEDI MODIFICA</button></div>
        <div id="edit-profilo" style="display: none; background: #f8f9fa; padding: 20px; border: 1px solid #ddd; border-left: 5px solid var(--warning); margin-top: 20px; border-radius:6px;">
            <h4 style="margin-top:0;">Richiesta Modifica Dati Personali e Finanziari</h4>
            <div style="display:flex; gap:10px; flex-wrap:wrap; margin-bottom: 10px;">
                <div style="flex:1; min-width:200px;"><label style="font-size:12px; font-weight:bold;">Grado:</label><input type="text" id="edit-grado" value="${utenteCorrente.grado}"></div>
                <div style="flex:1; min-width:200px;"><label style="font-size:12px; font-weight:bold;">Reparto / Comando:</label><input type="text" id="edit-reparto" value="${utenteCorrente.reparto}"></div>
            </div>
            <div style="display:flex; gap:10px; flex-wrap:wrap; margin-bottom: 10px;">
                <div style="flex:1; min-width:200px;"><label style="font-size:12px; font-weight:bold;">Provincia di Servizio:</label><input type="text" id="edit-provservizio" value="${utenteCorrente.provServizio}"></div>
                <div style="flex:1; min-width:200px;"><label style="font-size:12px; font-weight:bold;">Email:</label><input type="text" id="edit-email" value="${utenteCorrente.email}"></div>
                <div style="flex:1; min-width:200px;"><label style="font-size:12px; font-weight:bold;">Telefono:</label><input type="text" id="edit-telefono" value="${utenteCorrente.telefono}"></div>
            </div>
            <h4 style="margin-top:25px; margin-bottom:5px; border-bottom:1px solid #ccc; padding-bottom:5px;">Dati per Rimborsi</h4>
            <label style="font-size:12px; font-weight:bold;">Codice Fiscale:</label><input type="text" id="edit-cf" value="${utenteCorrente.cf || ''}" placeholder="Inserisci Codice Fiscale">
            <p style="font-size:12px; font-weight:bold; margin: 15px 0 5px 0;">IBAN (Max 2)</p>
            <div style="display:flex; gap:10px;"><input type="text" id="edit-iban1-alias" placeholder="Alias (es. Principale)" value="${(utenteCorrente.ibans && utenteCorrente.ibans[0]) ? utenteCorrente.ibans[0].alias : ''}" style="flex:1; margin:0;"><input type="text" id="edit-iban1-val" placeholder="IT..." value="${(utenteCorrente.ibans && utenteCorrente.ibans[0]) ? utenteCorrente.ibans[0].iban : ''}" style="flex:2; margin:0;"></div>
            <div style="display:flex; gap:10px; margin-top:5px;"><input type="text" id="edit-iban2-alias" placeholder="Alias (es. Secondario)" value="${(utenteCorrente.ibans && utenteCorrente.ibans[1]) ? utenteCorrente.ibans[1].alias : ''}" style="flex:1; margin:0;"><input type="text" id="edit-iban2-val" placeholder="IT..." value="${(utenteCorrente.ibans && utenteCorrente.ibans[1]) ? utenteCorrente.ibans[1].iban : ''}" style="flex:2; margin:0;"></div>
            <p style="font-size:12px; font-weight:bold; margin: 15px 0 5px 0;">Vetture (Max 3)</p>
            <div style="display:flex; gap:10px;"><input type="text" id="edit-vet1-mod" placeholder="Modello" value="${(utenteCorrente.vetture && utenteCorrente.vetture[0]) ? utenteCorrente.vetture[0].modello : ''}" style="flex:2; margin:0;"><input type="text" id="edit-vet1-tar" placeholder="Targa" value="${(utenteCorrente.vetture && utenteCorrente.vetture[0]) ? utenteCorrente.vetture[0].targa : ''}" style="flex:1; margin:0;"></div>
            <div style="display:flex; gap:10px; margin-top:5px;"><input type="text" id="edit-vet2-mod" placeholder="Modello" value="${(utenteCorrente.vetture && utenteCorrente.vetture[1]) ? utenteCorrente.vetture[1].modello : ''}" style="flex:2; margin:0;"><input type="text" id="edit-vet2-tar" placeholder="Targa" value="${(utenteCorrente.vetture && utenteCorrente.vetture[1]) ? utenteCorrente.vetture[1].targa : ''}" style="flex:1; margin:0;"></div>
            <div style="display:flex; gap:10px; margin-top:5px;"><input type="text" id="edit-vet3-mod" placeholder="Modello" value="${(utenteCorrente.vetture && utenteCorrente.vetture[2]) ? utenteCorrente.vetture[2].modello : ''}" style="flex:2; margin:0;"><input type="text" id="edit-vet3-tar" placeholder="Targa" value="${(utenteCorrente.vetture && utenteCorrente.vetture[2]) ? utenteCorrente.vetture[2].targa : ''}" style="flex:1; margin:0;"></div>
            <div style="margin-top:25px;"><button class="btn btn-primary" style="width:100%; margin:0;" onclick="if(typeof inviaRichiestaModificaProfilo === 'function') inviaRichiestaModificaProfilo()">INVIA RICHIESTA</button></div>
            <p id="msg-modifica-profilo" style="font-weight: bold; margin-top: 15px;"></p>
        </div>`;
    } else { html += `</div>`; } return html;
  }

  function ricaricaFotoProfiloUI() { 
      const savedPic = utenteCorrente.fotoUrl; 
      if(savedPic && savedPic.trim() !== "") { 
          document.querySelectorAll('.profilo-img').forEach(img => { img.src = savedPic; img.style.display = 'block'; }); 
          document.querySelectorAll('.profilo-img-placeholder').forEach(span => { span.style.display = 'none'; }); 
      } else {
          document.querySelectorAll('.profilo-img').forEach(img => { img.style.display = 'none'; });
          document.querySelectorAll('.profilo-img-placeholder').forEach(span => { span.style.display = 'block'; span.innerText = "Carica Foto"; });
      }
  }

  function salvaImmagineLocale(event) { 
      const file = event.target.files[0]; if (!file) return;
      if (file.size > 2 * 1024 * 1024) { alert("Foto troppo grande (>2MB)."); return; }
      document.querySelectorAll('.profilo-img-placeholder').forEach(s => { s.style.display='block'; s.innerText="Upload..."; });
      document.querySelectorAll('.profilo-img').forEach(i => i.style.display='none');
      const reader = new FileReader(); 
      reader.onload = function(e) { 
          google.script.run.withSuccessHandler(res => {
              if (res && res.success) { utenteCorrente.fotoUrl = res.url; ricaricaFotoProfiloUI(); showToast("Foto aggiornata!"); } 
              else { alert("Errore foto: " + res.error); ricaricaFotoProfiloUI(); }
          }).salvaFotoProfiloDrive(utenteCorrente.cip, utenteCorrente.segreteria, e.target.result.split(',')[1], file.type, "foto.jpg");
      }; reader.readAsDataURL(file); 
  }
</script>
